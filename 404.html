<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — KoKo · Kochattante Kolayi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233d6b45'/><text y='.9em' font-size='72' x='10' fill='%23fdf8f0' font-family='serif' font-weight='bold'>K</text></svg>" />
  <style>
    body { background: var(--cream); }
    .not-found {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    .not-found-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: #5c8f65;
      margin-bottom: 0.5rem;
    }
    .not-found img {
      max-width: 140px;
      border-radius: 50%;
      border: 3px solid var(--sage-light);
    }
    .not-found h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--text-dark);
      margin-top: 0.5rem;
    }
    .not-found p {
      color: var(--text-medium);
      max-width: 38ch;
      font-size: 1rem;
    }
    .not-found-btn {
      display: inline-block;
      background: var(--ochre);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      margin-top: 0.5rem;
      transition: background 0.35s ease, transform 0.35s ease;
    }
    .not-found-btn:hover {
      background: var(--terracotta);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-logo">KoKo</div>
    <img src="/img/kochattan-thumpsup.jpeg" alt="Kochattan" width="140" height="140" />
    <h1>Wrong path, friend!</h1>
    <p>Looks like Kochattan took a wrong turn on the farm trail. This page doesn't exist.</p>
    <a href="/" class="not-found-btn">Back to KoKo Farm</a>
  </div>
</body>
</html>
